name: Flake update

# Weekly `nix flake update`, validated by the same gates as regular CI
# (formatting, flake eval, per-host builds, boot-smoke). If everything passes,
# the bump is committed straight to master (no PR gate — deliberate, see
# docs/roadmap.md "No unattended nix flake update cadence") and then deployed
# to every host over the headscale mesh. Safety net for the unattended deploy
# is deploy-rs's rollback: `deployActivate` in flake.nix gates activation on a
# post-switch health check (system reaches running/degraded within 2 minutes)
# and deploy-rs auto-reverts to the previous generation on any activation
# failure or lost SSH confirmation (autoRollback/magicRollback, both on by
# default). If a host doesn't come back healthy, it stays on its old
# generation and the job fails loudly rather than leaving it broken.
#
# Required repo secrets (none of this runs without them — set up once):
#   HEADSCALE_PREAUTH_KEY  — reusable, ephemeral preauth key from
#     `headscale preauthkeys create --ephemeral --reusable --expiration 8760h`
#     on ganymede, scoped to the tag this workflow's node should carry.
#   DEPLOY_SSH_PRIVATE_KEY — private half of a deploy-only SSH keypair; the
#     public half must be an authorized key for the deploy user
#     (deploy.nodes.<host>.profiles.system.user in flake.nix, currently root)
#     on every host. Not a `make gen-secrets` credential — this is a
#     human-provisioned CI credential, set it by hand.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting
        if: steps.diff.outputs.changed == 'true'
        run: nix run nixpkgs#nixfmt-rfc-style -- --check .

      - name: Flake check (evaluates every host + deploy checks)
        if: steps.diff.outputs.changed == 'true'
        run: nix flake check --no-build

      - name: Build every host closure
        if: steps.diff.outputs.changed == 'true'
        run: |
          for host in ganymede himalia europa metis adrastea amalthea thebe callisto; do
            nix build .#nixosConfigurations.$host.config.system.build.toplevel
          done

      - name: Enable KVM
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot smoke test every VM-bootable host
        if: steps.diff.outputs.changed == 'true'
        run: |
          for host in ganymede himalia europa metis adrastea amalthea thebe; do
            ./scripts/boot-smoke.sh $host 360
          done

      # Direct push, not a PR — see the meta comment above. All the gates
      # above already ran on this exact flake.lock; nothing more reviews it.
      - name: Commit and push flake.lock
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "flake.lock: weekly update"
          git push origin HEAD:master

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [ganymede, himalia, europa, metis, adrastea, amalthea, thebe, callisto]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Join headscale mesh
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.HEADSCALE_PREAUTH_KEY }}
          args: --login-server=https://headscale.jupiter.au --hostname=ci-flake-update-${{ github.run_id }}
          tags: tag:ci

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Deploy ${{ matrix.host }}
        run: |
          nix develop -c deploy \
            ".#${{ matrix.host }}" \
            --hostname "${{ matrix.host }}.home.jupiter.au" \
            --ssh-opts "-o StrictHostKeyChecking=accept-new"

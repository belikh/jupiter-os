name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: formatting + flake evaluation.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check formatting
        run: nix run nixpkgs#nixfmt-rfc-style -- --check .
      - name: Flake check (evaluates every host)
        run: nix flake check --no-build

  # Build each host's system closure, then boot it headless in QEMU and
  # assert it reaches multi-user — catches bootloader / disko / impermanence
  # / unit-ordering regressions that a pure `nix build` of the toplevel
  # can't. sops secrets are read at activation time, not build time, so no
  # decryption key is needed here.
  build-and-boot-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [amalthea]
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
      - name: Boot smoke test ${{ matrix.host }}
        run: ./scripts/boot-smoke.sh ${{ matrix.host }} 360

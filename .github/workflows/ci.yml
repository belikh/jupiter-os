name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: formatting + full flake evaluation (includes deploy-rs checks).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check formatting
        run: nix run nixpkgs#nixfmt-rfc-style -- --check .
      - name: Flake check (evaluates every host + deploy checks)
        run: nix flake check --no-build
      - name: Modules options doc is up to date
        run: make docs-modules-check

  # Actually build each host's system closure. sops secrets are read at
  # activation time, not build time, so no decryption key is needed here.
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [ganymede, himalia, europa, metis, adrastea, amalthea, thebe, callisto]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

  # Boot each disk host in a headless QEMU VM and assert it reaches multi-user —
  # catches bootloader / disko / impermanence / unit-ordering regressions that a
  # pure `nix build` of the toplevel can't. callisto is a diskless netboot image
  # (not VM-bootable this way), so it's covered by `build` above only.
  boot-test:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        host: [ganymede, himalia, europa, metis, adrastea, amalthea, thebe]
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Boot smoke test ${{ matrix.host }}
        run: ./scripts/boot-smoke.sh ${{ matrix.host }} 360
